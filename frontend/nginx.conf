# UC10 frontend — serves Angular SPA and reverse-proxies /api and /health
# to the backend container over the internal compose network.
worker_processes  auto;
# Non-root /var/run is read-only in many base images — use /tmp instead.
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Writable-by-nginx tmp paths so the non-root user can buffer request bodies,
  # proxy responses, FastCGI/UWSGI/SCGI, and a client body keepalive cache.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;

  # Receipts can be up to 10 MB; add headroom for multipart overhead.
  client_max_body_size 15M;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/xml+rss text/javascript
             image/svg+xml;

  upstream uc10_backend {
    server backend:8080;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API reverse proxy ----------
    location /api/ {
      proxy_pass         http://uc10_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # Backend health — the portal can hit this without auth to probe liveness.
    location = /health {
      proxy_pass         http://uc10_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    # Swagger (useful during judging). Remove the three blocks below for a
    # locked-down deploy; leaving them in for the hackathon demo.
    location /swagger { proxy_pass http://uc10_backend; proxy_set_header Host $host; }
    location /swagger/ { proxy_pass http://uc10_backend; proxy_set_header Host $host; }

    # ---------- Static assets (hashed filenames → long cache) ----------
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # ---------- Angular SPA fallback ----------
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
