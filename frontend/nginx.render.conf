# nginx config for Render deployment.
# Serves Angular SPA over HTTPS (terminated at Render's edge) and reverse-
# proxies /api + /health + /swagger to the existing backend at runasp.net
# (HTTP). Server-to-server proxy means browsers only see same-origin HTTPS,
# avoiding mixed-content blocks.

worker_processes  auto;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 15M;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/xml+rss text/javascript
             image/svg+xml;

  resolver 1.1.1.1 8.8.8.8 ipv6=off valid=60s;

  set $backend_host expenseiq.runasp.net;

  server {
    listen 10000 default_server;
    listen [::]:10000 default_server;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API reverse proxy (HTTP upstream; browser sees HTTPS) ----------
    location /api/ {
      proxy_pass         http://$backend_host$request_uri;
      proxy_http_version 1.1;
      proxy_set_header   Host              $backend_host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 90s;
      proxy_send_timeout 90s;
    }

    location = /health {
      proxy_pass         http://$backend_host/health;
      proxy_set_header   Host $backend_host;
    }

    location /swagger {
      proxy_pass         http://$backend_host;
      proxy_set_header   Host $backend_host;
    }
    location /swagger/ {
      proxy_pass         http://$backend_host;
      proxy_set_header   Host $backend_host;
    }

    # Static assets
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Angular SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
