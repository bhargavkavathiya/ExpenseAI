# nginx config for Render deployment.
# Same-origin proxy: SPA + /api -> backend public Render URL over HTTPS.
worker_processes  auto;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 15M;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/xml+rss text/javascript
             image/svg+xml;

  # Public DNS resolver (needed for runtime DNS resolution of HTTPS upstream).
  resolver 1.1.1.1 8.8.8.8 ipv6=off valid=60s;

  # Backend on Render — name must match the service in render.yaml.
  # If you rename the service, update this hostname AND render.yaml together.
  set $backend_host expenseai-api.onrender.com;

  server {
    listen 10000 default_server;
    listen [::]:10000 default_server;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API reverse proxy (browser sees only same-origin HTTPS) ----------
    location /api/ {
      proxy_pass             https://$backend_host$request_uri;
      proxy_http_version     1.1;
      proxy_ssl_server_name  on;
      proxy_set_header       Host              $backend_host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto https;
      proxy_read_timeout     90s;
      proxy_send_timeout     90s;
    }

    location = /health {
      proxy_pass             https://$backend_host/health;
      proxy_ssl_server_name  on;
      proxy_set_header       Host $backend_host;
    }

    location /swagger {
      proxy_pass             https://$backend_host;
      proxy_ssl_server_name  on;
      proxy_set_header       Host $backend_host;
    }
    location /swagger/ {
      proxy_pass             https://$backend_host;
      proxy_ssl_server_name  on;
      proxy_set_header       Host $backend_host;
    }

    # Static assets (hashed filenames -> long cache)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Angular SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
