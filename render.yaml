# Render Blueprint — frontend-only deploy.
# Backend is hosted separately at http://expenseiq.runasp.net.
# nginx in this service reverse-proxies /api -> backend (server-side, HTTP),
# while serving the SPA over HTTPS to browsers (no mixed-content issue).

services:
  - type: web
    name: expenseai-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile.render
    plan: free
    region: oregon
    autoDeploy: true
